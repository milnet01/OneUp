name: Release

# Build the single-file AppImage and attach it to the GitHub release whenever a
# version tag (v1.0.0, v1.1.0, …) is pushed.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04   # build on an older glibc so the AppImage runs widely
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      # Same gate local-CI.sh runs first, so a broken engine never ships in a release.
      - name: Run engine tests
        run: bash tests/run-tests.sh

      # Stdlib-only; asserts bump.py advances every version site (mirrors local-CI.sh).
      - name: bump.py functional test
        run: python tests/bump-test.py

      # Headless GUI smoke test (offscreen Qt). Mirrors local-CI.sh. A real
      # assertion failure blocks the release; exit 77 (PySide6/Qt unavailable) is
      # treated as a skip so an environment quirk can't hold up a tag.
      - name: GUI smoke test (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3
          python -m pip install --quiet PySide6
          python tests/gui-smoke.py || { rc=$?; [ "$rc" -eq 77 ] && echo "PySide6 unavailable — skipped"; [ "$rc" -eq 77 ] || exit "$rc"; }

      - name: Install FUSE (needed to pack the AppImage)
        run: sudo apt-get update && sudo apt-get install -y libfuse2

      - name: Build AppImage
        run: bash packaging/appimage/build-appimage.sh

      - name: Attach AppImage to the release
        uses: softprops/action-gh-release@v3
        with:
          files: OneUp-x86_64.AppImage
          generate_release_notes: true
